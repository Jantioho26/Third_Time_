<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joy Antioho</title>

    <link rel="stylesheet" href="style.css">

    <script src="https://kit.fontawesome.com/f486b272da.js" crossorigin="anonymous"></script>
</head>

<body>

    <section id="about-me">
        <nav>
            <div class="personal__logo">Joy Antioho</div>

            <ul class="nav__link--list">
                <li>
                    <a href="#languages" class="nav__link__anchor link__hover--effect link__hover-effect--black">
                        Languages
                    </a>
                </li>

                <li>
                    <a href="#projects" class="nav__link__anchor link__hover--effect link__hover-effect--black">
                        Projects
                    </a>
                </li>

                <li>
                    <a href="#contact" class="nav__link__anchor nav__link--anchor-primary">
                        Contact
                    </a>
                </li>
            </ul>
        </nav>

        <div class="flex flex-1">
            <div class="about-me__info row">

                <div class="about-me__info--container">
                    <figure class="about-me__picture--mask">
                        <img src="./assets/_storage_emulated_0_DCIM_Camera_20180528_205220.JPG"
                            class="about-me__picture" alt="Joy Antioho">
                    </figure>

                    <h1 class="about-me__info--title">
                        Hello! I'm
                        <span class="text--purple">Joy Antioho</span>
                    </h1>

                    <p class="about-me__info--para">
                        I am a
                        <span class="text--purple">frontend developer</span>
                        whose passion is creating functional yet beautiful web
                        applications.
                    </p>

                    <div class="about-me__links">
                        <a href="https://linkedin.com" target="_blank" rel="noopener noreferrer" class="about-me__link"
                            aria-label="LinkedIn">
                            <i class="fa-brands fa-linkedin"></i>
                        </a>

                        <a href="https://github.com" target="_blank" rel="noopener noreferrer" class="about-me__link"
                            aria-label="GitHub">
                            <i class="fa-brands fa-github"></i>
                        </a>

                        <a href="mailto:your-email@example.com" class="about-me__link" aria-label="Email">
                            <i class="fa-solid fa-envelope"></i>
                        </a>
                    </div>
                </div>

                <figure class="about-me__img--container">
                    <img src="./assets/undraw_websites.svg" class="about-me__img"
                        alt="Website development illustration">
                </figure>

            </div>
        </div>
    </section>
    <section id="languages">
        <div class="container">
            <div class="row">

                <h1 class="section__title">
                    This is my technology stack
                </h1>

                <div class="language__list">

                    <div class="language">
                        <figure class="language__img--wrapper">
                            <img src="https://upload.wikimedia.org/wikipedia/commons/3/38/HTML5_Badge.svg"
                                alt="HTML logo" class="language__img">
                        </figure>
                        <span class="language__name">HTML</span>
                    </div>

                    <div class="language">
                        <figure class="language__img--wrapper">
                            <img src="https://cdn.iconscout.com/icon/free/png-256/css-131-722685.png" alt="CSS logo"
                                class="language__img">
                        </figure>
                        <span class="language__name">CSS</span>
                    </div>

                    <div class="language">
                        <figure class="language__img--wrapper">
                            <img src="https://cdn.iconscout.com/icon/free/png-256/typescript-3521774-2945272.png"
                                alt="TypeScript logo" class="language__img">
                        </figure>
                        <span class="language__name">TypeScript</span>
                    </div>

                    <div class="language">
                        <figure class="language__img--wrapper">
                            <img src="https://cdn.iconscout.com/icon/free/png-256/vue-282497.png" alt="Vue logo"
                                class="language__img">
                        </figure>
                        <span class="language__name">Vue</span>
                    </div>

                    <div class="language">
                        <figure class="language__img--wrapper">
                            <img src="https://cdn.iconscout.com/icon/free/png-256/nuxt-dot-js-3628959-3030184.png"
                                alt="Nuxt logo" class="language__img">
                        </figure>
                        <span class="language__name">Nuxt</span>
                    </div>

                    <div class="language">
                        <figure class="language__img--wrapper">
                            <img src="https://cdn.iconscout.com/icon/free/png-256/react-3-1175109.png" alt="React logo"
                                class="language__img">
                        </figure>
                        <span class="language__name">React</span>
                    </div>

                    <div class="language">
                        <figure class="language__img--wrapper">
                            <img src="https://upload.wikimedia.org/wikipedia/commons/3/38/HTML5_Badge.svg"
                                alt="HTML logo" class="language__img">
                        </figure>
                        <span class="language__name">HTML</span>
                    </div>

                    <div class="language">
                        <figure class="language__img--wrapper">
                            <img src="https://mobx.js.org/img/mobx.png" alt="MobX logo" class="language__img">
                        </figure>
                        <span class="language__name">MobX</span>
                    </div>

                </div>
            </div>
        </div>
    </section>

</body>
